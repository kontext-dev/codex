name: Auto-merge upstream sync PRs

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
  push:
    branches:
      - kontext-dev
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  guard:
    if: github.event_name == 'push' && github.ref_name == 'kontext-dev'
    runs-on: ubuntu-latest
    steps:
      - name: No-op for branch pushes
        run: echo "auto-merge-sync runs only for pull_request_target events."

  auto-merge:
    if: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.base.ref == 'kontext-dev' && contains(github.event.pull_request.labels.*.name, 'upstream-sync') }}
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh pr merge "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --auto --squash; then
            echo "Could not enable auto-merge. Ensure repository setting 'Allow auto-merge' is enabled."
          fi
