name: Auto-merge upstream sync PRs

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.event.pull_request.base.ref == 'kontext-dev' && contains(github.event.pull_request.labels.*.name, 'upstream-sync')
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh pr merge "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --auto --squash; then
            echo "Could not enable auto-merge. Ensure repository setting 'Allow auto-merge' is enabled."
          fi
